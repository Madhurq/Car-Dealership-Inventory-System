version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dealership_postgres
    environment:
      POSTGRES_USER: incubyte
      POSTGRES_PASSWORD: incubytepass
      POSTGRES_DB: dealership_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: